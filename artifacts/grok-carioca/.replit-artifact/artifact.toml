kind = "web"
previewPath = "/"
title = "Grok Carioca"
version = "1.0.0"
id = "artifacts/grok-carioca"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21916

[services.development]
run = "pnpm --filter @workspace/grok-carioca run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grok-carioca", "run", "build" ]
publicDir = "artifacts/grok-carioca/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21916"
BASE_PATH = "/"
